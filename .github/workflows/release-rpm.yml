name: smoke-packages

on:
  workflow_dispatch:
    inputs:
      manifest:
        description: "Pinned upstream manifest path"
        default: "latest"
        required: true
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: smoke-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    container: fedora:44
    steps:
      - uses: actions/checkout@v4
      - name: Install check dependencies
        if: github.event_name != 'workflow_dispatch'
        run: |
          dnf install -y bash nodejs npm procps-ng python3
      - name: Install build dependencies
        if: github.event_name == 'workflow_dispatch'
        run: |
          dnf install -y \
            bash curl findutils gcc-c++ git make nodejs npm python3 \
            dpkg procps-ng rpm-build rsync tar unzip zstd desktop-file-utils
      - name: Mark scripts executable
        run: chmod +x install.sh scripts/*.sh scripts/linux-codex-app scripts/verify-install.sh
      - name: Run checks
        run: npm run check:ci
      - name: Build unsigned package artifacts
        if: github.event_name == 'workflow_dispatch'
        env:
          LINUX_CODEX_APP_REPO_BASEURL: https://kkkzbh.github.io/linux-codex-app/rpm/fedora/$releasever/$basearch
          LINUX_CODEX_APP_REPO_ENABLED: "1"
        run: ./scripts/build-runtime-packages.sh "${{ inputs.manifest || 'latest' }}"
      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: linux-codex-app-smoke-packages
          path: |
            dist/*.rpm
            dist/*.deb
            dist/*.AppImage
            dist/*.tar.gz
            dist/*.pkg.tar.zst
            dist/SHA256SUMS
